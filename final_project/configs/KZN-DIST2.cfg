hostname KZN-DIST2
!

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
no ip domain lookup
ip cef
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
banner motd ^C
Доступ разрешен только авторизованным администраторам.
Все действия могут быть записаны в журнал.
^C

!
interface Loopback1
 description KZN-DIST2-LOOPBACK
 ip address 10.110.15.22 255.255.255.255
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/0
 description TO-KZN-EDGE1
 ip address 10.110.1.6 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/2
 description TO-KZN-EDGE2
 ip address 10.110.1.14 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/3
 description TO-KZN-DIST1
 ip address 10.110.1.22 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/1
 description TRUNK-TO-KZN-ACCESS
 no ip address
 no shutdown
!
interface Ethernet0/1.10
 description VLAN10-USERS
 encapsulation dot1Q 10
 ip address 10.110.10.2 255.255.255.0
 standby 10 ip 10.110.10.254
 standby 10 priority 90
 standby 10 preempt
 ip access-group KZN-USERS-IN in
 ip ospf 1 area 0
!
interface Ethernet0/1.20
 description VLAN20-DEV
 encapsulation dot1Q 20
 ip address 10.110.20.2 255.255.255.0
 standby 20 ip 10.110.20.254
 standby 20 priority 110
 standby 20 preempt
 ip access-group KZN-DEV-IN in
 ip ospf 1 area 0
!
interface Ethernet0/1.30
 description VLAN30-MANAGEMENT
 encapsulation dot1Q 30
 ip address 10.110.30.2 255.255.255.0
 standby 30 ip 10.110.30.254
 standby 30 priority 90
 standby 30 preempt
 ip ospf 1 area 0
!
interface Ethernet0/1.40
 description VLAN40-FINANCE
 encapsulation dot1Q 40
 ip address 10.110.40.2 255.255.255.0
 standby 40 ip 10.110.40.254
 standby 40 priority 110
 standby 40 preempt
 ip access-group KZN-FINANCE-IN in
 ip ospf 1 area 0
!
router ospf 1
 router-id 10.110.15.22
 passive-interface default
 no passive-interface Ethernet0/0
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
!

ip access-list extended KZN-USERS-IN
 permit ip 10.110.10.0 0.0.0.255 host 10.150.100.10
 deny ip 10.110.10.0 0.0.0.255 host 10.150.100.20
 permit ip 10.110.10.0 0.0.0.255 host 10.150.100.30
 permit ip 10.110.10.0 0.0.0.255 any
!
ip access-list extended KZN-DEV-IN
 permit ip 10.110.20.0 0.0.0.255 host 10.150.100.10
 permit ip 10.110.20.0 0.0.0.255 host 10.150.100.20
 permit ip 10.110.20.0 0.0.0.255 host 10.150.100.30
 permit ip 10.110.20.0 0.0.0.255 any
!
ip access-list extended KZN-FINANCE-IN
 permit ip 10.110.40.0 0.0.0.255 host 10.150.100.20
 permit ip 10.110.40.0 0.0.0.255 host 10.150.100.30
 deny ip 10.110.40.0 0.0.0.255 10.110.20.0 0.0.0.255
 permit ip 10.110.40.0 0.0.0.255 any
!
ntp server 10.150.15.11
!

ip access-list standard MGMT-SSH
 permit 10.100.30.0 0.0.0.255
 permit 10.110.30.0 0.0.0.255
 permit 10.120.30.0 0.0.0.255
 permit 10.150.30.0 0.0.0.255
 deny any
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 access-class MGMT-SSH in
 login local
 transport input ssh
 exec-timeout 10 0
!
end
