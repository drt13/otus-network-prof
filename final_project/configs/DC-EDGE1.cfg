hostname DC-EDGE1
!

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
no ip domain lookup
ip cef
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
banner motd ^C
Доступ разрешен только авторизованным администраторам.
Все действия могут быть записаны в журнал.
^C

!
interface Loopback1
 description DC-EDGE1-LOOPBACK
 ip address 10.150.15.11 255.255.255.255
 no shutdown
!
interface Ethernet0/0
 description TRUNK-TO-DC-SW1
 no ip address
 no shutdown
!
interface Ethernet0/0.30
 description VLAN30-MANAGEMENT
 encapsulation dot1Q 30
 ip address 10.150.30.1 255.255.255.0
 no shutdown
!
interface Ethernet0/0.100
 description VLAN100-SERVERS
 encapsulation dot1Q 100
 ip address 10.150.100.1 255.255.255.0
 no shutdown
!
interface Ethernet0/1
 description TO-BB-R1
 ip address 100.64.150.2 255.255.255.252
 no shutdown
!
crypto isakmp policy 10
 encr aes 256
 hash sha256
 authentication pre-share
 group 14
 lifetime 86400
!
crypto isakmp key CorpVPN2026 address 0.0.0.0 0.0.0.0
!
crypto ipsec transform-set DMVPN-TS esp-aes 256 esp-sha256-hmac
 mode transport
!
crypto ipsec profile DMVPN-PROFILE
 set transform-set DMVPN-TS
!
interface Tunnel0
 description DMVPN-SPOKE-DC
 ip address 10.255.1.50 255.255.255.0
 no ip redirects
 ip nhrp authentication CORP-DMVPN
 ip nhrp network-id 100
 ip nhrp shortcut
 ip nhrp map multicast 100.65.1.2
 ip nhrp map multicast 100.65.2.2
 ip nhrp map 10.255.1.1 100.65.1.2
 ip nhrp map 10.255.1.2 100.65.2.2
 ip nhrp nhs 10.255.1.1
 ip nhrp nhs 10.255.1.2
 tunnel source Ethernet0/1
 tunnel mode gre multipoint
 tunnel key 100
 tunnel protection ipsec profile DMVPN-PROFILE
 no shutdown
!
router eigrp 100
 network 10.255.1.0 0.0.0.255
 network 10.150.0.0 0.0.255.255
 passive-interface default
 no passive-interface Tunnel0
 no auto-summary
!
router bgp 65550
 bgp log-neighbor-changes
 neighbor 100.64.150.1 remote-as 65000
 neighbor 100.64.150.1 description BB-R1
 network 10.150.0.0 mask 255.255.0.0
!
ip route 10.150.0.0 255.255.0.0 Null0
!
clock timezone MSK 3
ntp master 3
!

ip access-list standard MGMT-SSH
 permit 10.100.30.0 0.0.0.255
 permit 10.110.30.0 0.0.0.255
 permit 10.120.30.0 0.0.0.255
 permit 10.150.30.0 0.0.0.255
 deny any
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 access-class MGMT-SSH in
 login local
 transport input ssh
 exec-timeout 10 0
!
end
