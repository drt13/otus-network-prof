hostname HQ-ACC4
!
no ip domain lookup
service password-encryption
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
!
vlan 10
 name USERS
vlan 20
 name DEV
vlan 30
 name MANAGEMENT
vlan 40
 name FINANCE
!
interface Ethernet0/0
 description TRUNK-TO-HQ-DIST2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40
 no shutdown
!
interface Ethernet0/1
 description TO-TEST-USERS
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface Ethernet0/2
 description TO-TEST-DEV
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown
!
interface Vlan30
 description MANAGEMENT
 ip address 10.100.30.14 255.255.255.0
 no shutdown
!
ip default-gateway 10.100.30.254
!

ip access-list standard MGMT-SSH
 permit 10.100.30.0 0.0.0.255
 permit 10.110.30.0 0.0.0.255
 permit 10.120.30.0 0.0.0.255
 permit 10.150.30.0 0.0.0.255
 deny any
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 access-class MGMT-SSH in
 login local
 transport input ssh
 exec-timeout 10 0
!
end
