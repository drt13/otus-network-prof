hostname ISP-HQ-A
!

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
no ip domain lookup
ip cef
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
banner motd ^C
Доступ разрешен только авторизованным администраторам.
Все действия могут быть записаны в журнал.
^C

!
interface Loopback1
 description ISP-HQ-A-LOOPBACK
 ip address 100.65.15.1 255.255.255.255
 no shutdown
!
interface Ethernet0/0
 description TO-HQ-EDGE1
 ip address 100.65.1.1 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description TO-BB-R1
 ip address 100.64.101.2 255.255.255.252
 no shutdown
!
router bgp 64501
 bgp log-neighbor-changes
 neighbor 100.65.1.2 remote-as 65100
 neighbor 100.65.1.2 description HQ-EDGE1
 neighbor 100.65.1.2 default-originate
 neighbor 100.64.101.1 remote-as 65000
 neighbor 100.64.101.1 description BB-R1
 redistribute connected
!
ntp server 10.150.15.11
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
!
end
