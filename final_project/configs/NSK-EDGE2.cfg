hostname NSK-EDGE2
!

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
no ip domain lookup
ip cef
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
banner motd ^C
Доступ разрешен только авторизованным администраторам.
Все действия могут быть записаны в журнал.
^C

!
interface Loopback1
 description NSK-EDGE2-LOOPBACK
 ip address 10.120.15.12 255.255.255.255
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/0
 description TO-ISP-NSK-B
 ip address 100.67.2.2 255.255.255.252
 ip nat outside
 no shutdown
!
interface Ethernet0/1
 description TO-NSK-DIST1
 ip address 10.120.1.9 255.255.255.252
 ip nat inside
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/2
 description TO-NSK-DIST2
 ip address 10.120.1.13 255.255.255.252
 ip nat inside
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/3
 description TO-NSK-EDGE1
 ip address 10.120.1.18 255.255.255.252
 ip nat inside
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
crypto isakmp policy 10
 encr aes 256
 hash sha256
 authentication pre-share
 group 14
 lifetime 86400
!
crypto isakmp key CorpVPN2026 address 0.0.0.0 0.0.0.0
!
crypto ipsec transform-set DMVPN-TS esp-aes 256 esp-sha256-hmac
 mode transport
!
crypto ipsec profile DMVPN-PROFILE
 set transform-set DMVPN-TS
!
interface Tunnel0
 description DMVPN-SPOKE-NSK-EDGE2
 ip address 10.255.1.22 255.255.255.0
 no ip redirects
 ip nhrp authentication CORP-DMVPN
 ip nhrp network-id 100
 ip nhrp shortcut
 ip nhrp map multicast 100.65.1.2
 ip nhrp map multicast 100.65.2.2
 ip nhrp map 10.255.1.1 100.65.1.2
 ip nhrp map 10.255.1.2 100.65.2.2
 ip nhrp nhs 10.255.1.1
 ip nhrp nhs 10.255.1.2
 tunnel source Ethernet0/0
 tunnel mode gre multipoint
 tunnel key 100
 tunnel protection ipsec profile DMVPN-PROFILE
 no shutdown
!
router ospf 1
 router-id 10.120.15.12
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
 redistribute eigrp 100 subnets
!
router eigrp 100
 network 10.255.1.0 0.0.0.255
 redistribute ospf 1 metric 10000 100 255 1 1500
 passive-interface default
 no passive-interface Tunnel0
 no auto-summary
!
router bgp 65300
 bgp log-neighbor-changes
 neighbor 10.120.15.11 remote-as 65300
 neighbor 10.120.15.11 update-source Loopback1
 neighbor 100.67.2.1 remote-as 64522
 neighbor 100.67.2.1 description ISP-NSK-B
 neighbor 100.67.2.1 route-map FILTER-PRIVATE-OUT out
!
ip access-list extended NAT-NSK
 deny ip 10.120.0.0 0.0.255.255 10.100.0.0 0.0.255.255
 deny ip 10.120.0.0 0.0.255.255 10.110.0.0 0.0.255.255
 deny ip 10.120.0.0 0.0.255.255 10.150.0.0 0.0.255.255
 permit ip 10.120.0.0 0.0.255.255 any
!
ip nat inside source list NAT-NSK interface Ethernet0/0 overload
!
ip prefix-list PRIVATE-OUT seq 5 deny 10.0.0.0/8 le 32
ip prefix-list PRIVATE-OUT seq 10 permit 0.0.0.0/0 le 32
!
route-map FILTER-PRIVATE-OUT permit 10
 match ip address prefix-list PRIVATE-OUT
!
ntp server 10.150.15.11
!

ip access-list standard MGMT-SSH
 permit 10.100.30.0 0.0.0.255
 permit 10.110.30.0 0.0.0.255
 permit 10.120.30.0 0.0.0.255
 permit 10.150.30.0 0.0.0.255
 deny any
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 access-class MGMT-SSH in
 login local
 transport input ssh
 exec-timeout 10 0
!
end
