hostname DC-SW1
!
no ip domain lookup
service password-encryption
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
!
vlan 30
 name MANAGEMENT
vlan 100
 name SERVERS
!
interface Ethernet0/0
 description TRUNK-TO-DC-EDGE1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 30,100
 no shutdown
!
interface Ethernet0/1
 description TO-APP-SRV
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast
 no shutdown
!
interface Ethernet0/2
 description TO-DB-SRV
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast
 no shutdown
!
interface Ethernet0/3
 description TO-NTP-DHCP
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast
 no shutdown
!
interface Vlan30
 description MANAGEMENT
 ip address 10.150.30.11 255.255.255.0
 no shutdown
!
ip default-gateway 10.150.30.1
!

ip access-list standard MGMT-SSH
 permit 10.100.30.0 0.0.0.255
 permit 10.110.30.0 0.0.0.255
 permit 10.120.30.0 0.0.0.255
 permit 10.150.30.0 0.0.0.255
 deny any
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 access-class MGMT-SSH in
 login local
 transport input ssh
 exec-timeout 10 0
!
end
