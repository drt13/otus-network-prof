hostname BB-R4
!

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
no ip domain lookup
ip cef
ip domain-name corp.local
enable secret cisco
username admin privilege 15 secret cisco
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
banner motd ^C
Доступ разрешен только авторизованным администраторам.
Все действия могут быть записаны в журнал.
^C

!
interface Loopback1
 description BB-R4-LOOPBACK
 ip address 100.64.15.4 255.255.255.255
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/0
 description TO-BB-R2
 ip address 100.64.1.10 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/1
 description TO-BB-R3
 ip address 100.64.1.14 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/2
 description TO-BB-R1
 ip address 100.64.1.18 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface Ethernet0/3
 description TO-ISP-KZN-B
 ip address 100.64.112.1 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description TO-ISP-NSK-B
 ip address 100.64.122.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 100.64.15.4
 passive-interface default
 no passive-interface Ethernet0/0
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
!
router bgp 65000
 bgp log-neighbor-changes
 neighbor 100.64.15.1 remote-as 65000
 neighbor 100.64.15.1 update-source Loopback1
 neighbor 100.64.15.1 next-hop-self
 neighbor 100.64.15.2 remote-as 65000
 neighbor 100.64.15.2 update-source Loopback1
 neighbor 100.64.15.2 next-hop-self
 neighbor 100.64.15.3 remote-as 65000
 neighbor 100.64.15.3 update-source Loopback1
 neighbor 100.64.15.3 next-hop-self
 neighbor 100.64.112.2 remote-as 64512
 neighbor 100.64.112.2 description ISP-KZN-B
 neighbor 100.64.122.2 remote-as 64522
 neighbor 100.64.122.2 description ISP-NSK-B
 redistribute connected
!
ntp server 10.150.15.11
!

line con 0
 logging synchronous
 exec-timeout 10 0
!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
!
end
